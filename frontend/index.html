<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sistema de cadastro e login</title>
</head>
<body>
   <div id="cadastro"> 
    <form id="formCadastro">
        <input type="text" id="nome" placeholder="nome">
        <input type="email" id="email" placeholder="email">
        <input type="password" id="senha" placeholder="senha">
        <input type="password" id="confirmar_senha" placeholder="confirme sua senha">
        <button type="submit" id="bo_cadastro">Cadastrar-se</button>

    </form>
  </div>  

  <div id="login">
    <form id="formLogin">
        <input type="email" id="email" placeholder="email">
        <input type="password" id="senha" placeholder="senha">
        <button type="submit" id="bo_login">Entrar</button>
    </form>
  </div>

</body>
</html>
